<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>希望休申請</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#0891b2;--navy:#1c2b4a;--green:#16a34a;--red:#dc2626;--gray:#6b7280;--border:#e2e8f0;--bg:#f4f6fb}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--navy);min-height:100vh}
.header{background:var(--navy);color:#fff;padding:16px 20px;text-align:center}
.header h1{font-size:18px;font-weight:800}
.header p{font-size:12px;opacity:.6;margin-top:4px}
.main{max-width:500px;margin:0 auto;padding:20px}
.card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px}
.label{font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:block}
.select{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;outline:none;background:#fff;color:var(--navy)}
.select:focus{border-color:var(--teal)}
.type-tabs{display:flex;flex-wrap:wrap;gap:6px}
.type-tab{padding:8px 12px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:700;cursor:pointer;color:var(--navy);font-family:inherit;transition:.15s}
.type-tab.on{color:#fff;border-color:transparent}
.type-desc{font-size:11px;color:var(--gray);margin-top:10px;line-height:1.5}
.current-type-banner{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:14px}
.current-type-banner .dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px}
.cal-day-label{text-align:center;font-size:11px;font-weight:700;color:var(--gray);padding:4px 0}
.cal-day-label.sun{color:#ef4444}.cal-day-label.sat{color:#3b82f6}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-cell{aspect-ratio:1;border-radius:8px;border:1.5px solid var(--border);background:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;color:var(--navy)}
.cal-cell:hover{border-color:var(--teal);background:#e0f2f7}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default}
.cal-cell.sun{color:#ef4444}.cal-cell.sat{color:#3b82f6}
.selected-list{font-size:13px;color:var(--gray);margin-top:10px;min-height:20px}
.selected-list b{font-weight:700}
.submit-btn{width:100%;padding:14px;border-radius:10px;background:var(--teal);color:#fff;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s}
.submit-btn:hover{background:#0e7490}
.submit-btn:disabled{background:var(--gray);cursor:not-allowed}
.success{text-align:center;padding:40px 20px;display:none}
.success .icon{font-size:60px;margin-bottom:16px}
.success h2{font-size:20px;font-weight:800;margin-bottom:8px}
.success p{font-size:14px;color:var(--gray)}
.confirm-area{display:none}
.confirm-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.confirm-row:last-child{border-bottom:none}
.confirm-row .k{font-size:12px;color:var(--gray);font-weight:700}
.confirm-row .v{font-size:14px;font-weight:700;text-align:right}
.confirm-type-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.confirm-actions{display:flex;gap:8px;margin-top:16px}
.back-btn{padding:14px;border-radius:10px;background:var(--bg);color:var(--gray);border:1.5px solid var(--border);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;flex:1}
.confirm-submit-btn{padding:14px;border-radius:10px;background:var(--teal);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;flex:2}
.confirm-submit-btn:hover{background:#0e7490}
.confirm-submit-btn:disabled{background:var(--gray);cursor:not-allowed}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav h3{font-size:15px;font-weight:700}
.mnav-btn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:14px}
.loading-msg{text-align:center;color:var(--gray);font-size:13px;padding:8px 0;display:flex;align-items:center;gap:6px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.tabbar{display:flex;background:var(--navy);padding:0 12px}
.tabbtn{flex:1;padding:12px 8px;background:none;border:none;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border-bottom:2px solid transparent}
.tabbtn.on{color:#fff;border-bottom-color:var(--teal)}
.page{display:none}.page.on{display:block}
.sv-month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sv-month-nav h3{font-size:15px;font-weight:700}
.sv-legend{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;font-size:11px}
.sv-legend-item{display:flex;align-items:center;gap:4px;color:var(--gray)}
.sv-legend-dot{width:9px;height:9px;border-radius:3px;border:1px solid var(--border)}
.sv-table-wrap{overflow-x:auto;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.sv-table{border-collapse:collapse;background:#fff;min-width:640px}
.sv-table th{padding:6px 2px;font-size:10px;font-weight:700;color:#fff;background:var(--navy);text-align:center;width:30px}
.sv-table th:first-child{text-align:left;padding-left:8px;width:76px;position:sticky;left:0;background:var(--navy);z-index:2}
.sv-table th.sat{background:#3b82f6}.sv-table th.sun{background:#ef4444}.sv-table th.holiday{background:#f59e0b}
.sv-table td{border:1px solid var(--border);text-align:center;padding:2px;height:32px;width:30px;font-size:10px;font-weight:700}
.sv-table td:first-child{text-align:left;padding-left:8px;font-size:11px;font-weight:600;position:sticky;left:0;background:#fff;border-right:2px solid var(--border);z-index:1}
</style>
</head>
<body>
<div class="header">
  <h1>📅 希望休申請</h1>
  <p>種別を選び、休みたい日をカレンダーで選んで送信してください</p>
</div>
<div class="tabbar">
  <button class="tabbtn on" onclick="showTab('request',this)">📩 希望休申請</button>
  <button class="tabbtn" onclick="showTab('shiftview',this)">📅 シフト表を見る</button>
</div>
<div class="main">
  <div class="page on" id="page-request">
  <div id="form-area">
    <div class="card">
      <label class="label">あなたの名前</label>
      <div class="loading-msg" id="staff-loading"><div class="spinner"></div>スタッフ情報を読み込み中…</div>
      <select class="select" id="staff-select" style="display:none" onchange="renderMyBalance()">
        <option value="">-- 選択してください --</option>
      </select>
    </div>
    <div class="card" id="my-balance-card" style="display:none">
      <label class="label">🌴 あなたの休暇残日数</label>
      <div id="my-balance-content" style="font-size:13px;line-height:1.9;color:var(--navy)"></div>
    </div>
    <div class="card">
      <label class="label">休暇の種類</label>
      <div class="type-tabs" id="type-tabs"></div>
      <div class="type-desc" id="type-desc"></div>
    </div>
    <div class="current-type-banner" id="current-type-banner"></div>
    <div class="card">
      <div class="month-nav">
        <button class="mnav-btn" onclick="changeMonth(-1)">‹</button>
        <h3 id="cal-title"></h3>
        <button class="mnav-btn" onclick="changeMonth(1)">›</button>
      </div>
      <div class="cal-header">
        <div class="cal-day-label sun">日</div>
        <div class="cal-day-label">月</div>
        <div class="cal-day-label">火</div>
        <div class="cal-day-label">水</div>
        <div class="cal-day-label">木</div>
        <div class="cal-day-label">金</div>
        <div class="cal-day-label sat">土</div>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="selected-list" id="selected-list">希望日を選んでください</div>
    </div>
    <div class="card">
      <label class="label">備考（任意）</label>
      <textarea class="select" id="memo" rows="3" placeholder="理由など（任意）" style="resize:none"></textarea>
    </div>
    <button class="submit-btn" id="submit-btn" onclick="showConfirm()">確認する</button>
  </div>
  <div class="confirm-area" id="confirm-area">
    <div class="card">
      <div class="confirm-row"><div class="k">名前</div><div class="v" id="c-name"></div></div>
      <div class="confirm-row"><div class="k">種類</div><div class="v"><span class="confirm-type-badge" id="c-type"></span></div></div>
      <div class="confirm-row"><div class="k">対象月</div><div class="v" id="c-month"></div></div>
      <div class="confirm-row"><div class="k">希望日</div><div class="v" id="c-dates"></div></div>
      <div class="confirm-row"><div class="k">備考</div><div class="v" id="c-memo"></div></div>
    </div>
    <p style="font-size:12px;color:var(--gray);text-align:center;margin-bottom:14px">内容に間違いがないか確認してください</p>
    <div class="confirm-actions">
      <button class="back-btn" onclick="hideConfirm()">戻って修正する</button>
      <button class="confirm-submit-btn" id="confirm-submit-btn" onclick="submitRequest()">この内容で送信する</button>
    </div>
  </div>
  <div class="success" id="success-area">
    <div class="icon">✅</div>
    <h2>送信完了！</h2>
    <p>申請を受け付けました。<br>管理者が確認してシフトに反映します。</p>
  </div>
  </div>

  <div class="page" id="page-shiftview">
    <div class="card">
      <div class="sv-month-nav">
        <button class="mnav-btn" onclick="svChangeMonth(-1)">‹</button>
        <h3 id="sv-month-title"></h3>
        <button class="mnav-btn" onclick="svChangeMonth(1)">›</button>
      </div>
      <div class="sv-legend" id="sv-legend"></div>
      <div class="sv-table-wrap"><table class="sv-table" id="sv-table"></table></div>
      <p style="font-size:11px;color:var(--gray);margin-top:10px">※管理者が保存した確定版のシフトです。希望休の申請は別途「希望休申請」タブから行ってください。</p>
    </div>
  </div>
</div>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzoFNlBRZSjI1zvyCCpHyBpb7555mvaiG0-w8tca1MSSlaouNhNOHaVhAYXxPa49TJH/exec';

const LEAVE_TYPE_LIST = [
  {code:'off',        label:'公休希望',        desc:'通常の希望休（お休みにしたい日）',           bg:'#e2e8f0', color:'#475569'},
  {code:'paid',        label:'有給',            desc:'有給休暇（1日）',                         bg:'#16a34a', color:'#fff'},
  {code:'paid_am',     label:'AM有給',          desc:'午前のみの有給休暇（0.5日扱い）',           bg:'#4ade80', color:'#14532d'},
  {code:'paid_pm',     label:'PM有給',          desc:'午後のみの有給休暇（0.5日扱い）',           bg:'#86efac', color:'#14532d'},
  {code:'flex',        label:'フレックス休暇',   desc:'フレックス休暇（1日単位、半休は使えません）', bg:'#7c3aed', color:'#fff'},
  {code:'child',       label:'子の看護休暇',     desc:'子の看護休暇（1日）',                     bg:'#d97706', color:'#fff'},
  {code:'child_am',    label:'AM子の看護休暇',   desc:'午前のみの子の看護休暇（0.5日扱い）',       bg:'#fbbf24', color:'#78350f'},
  {code:'child_pm',    label:'PM子の看護休暇',   desc:'午後のみの子の看護休暇（0.5日扱い）',       bg:'#fcd34d', color:'#78350f'},
  {code:'bereave',     label:'慶弔休暇',         desc:'慶弔休暇（1日）',                         bg:'#be185d', color:'#fff'},
  {code:'absence',     label:'欠勤',            desc:'欠勤（1日）',                             bg:'#dc2626', color:'#fff'},
  {code:'absence_am',  label:'AM欠勤',          desc:'午前のみの欠勤（0.5日扱い）',               bg:'#f87171', color:'#7f1d1d'},
  {code:'absence_pm',  label:'PM欠勤',          desc:'午後のみの欠勤（0.5日扱い）',               bg:'#fca5a5', color:'#7f1d1d'},
];
function currentTypeInfo(){ return LEAVE_TYPE_LIST.find(t=>t.code===currentType) || LEAVE_TYPE_LIST[0]; }

// "yyyy-MM-dd"形式の日付文字列を、常にローカルの日付として安全に解釈する
function parseLocalDate(str){
  if(!str) return new Date(NaN);
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(str.toString().trim());
  if(!m) return new Date(str);
  return new Date(Number(m[1]), Number(m[2])-1, Number(m[3]));
}

let selections = {};
let calYear, calMonth;
let currentType = 'off';

function renderTypeTabs(){
  const wrap = document.getElementById('type-tabs');
  wrap.innerHTML = LEAVE_TYPE_LIST.map(t =>
    `<button type="button" class="type-tab${t.code===currentType?' on':''}" style="${t.code===currentType?`background:${t.bg};color:${t.color}`:''}" onclick="selectType('${t.code}')">${t.label}</button>`
  ).join('');
  const cur = currentTypeInfo();
  document.getElementById('type-desc').textContent = cur.desc;
  renderCurrentTypeBanner();
}
function renderCurrentTypeBanner(){
  const cur = currentTypeInfo();
  const el = document.getElementById('current-type-banner');
  el.style.background = cur.bg + '22';
  el.style.color = cur.color === '#fff' ? cur.bg : cur.color;
  el.innerHTML = `<span class="dot" style="background:${cur.bg}"></span>今から選ぶ日は：<span style="font-size:14px">${cur.label}</span>　<span style="font-weight:400;font-size:11px">（すでに選んだ日には影響しません）</span>`;
}
function selectType(code){
  currentType = code;
  renderTypeTabs();
}

let allStaff = [];
let leaveSettings = {paidBaseDays:10, paidIncrement:1, flexDays:6, childDaysPerKid:3};
let kibouListCache = [];
const HALF_DAY_CODES = ['paid_am','paid_pm','child_am','child_pm','absence_am','absence_pm'];
function dayWeight(code){ return HALF_DAY_CODES.includes(code) ? 0.5 : 1; }

async function loadStaff(){
  try {
    const res = await fetch(`${GAS_URL}?action=loadStaff`);
    const data = await res.json();
    allStaff = data.staff || [];
    const sel = document.getElementById('staff-select');
    sel.innerHTML = '<option value="">-- 選択してください --</option>';
    if(allStaff.length > 0){
      allStaff.forEach(s => {
        const o = document.createElement('option');
        o.value = s.name; o.textContent = s.name;
        sel.appendChild(o);
      });
    } else {
      sel.innerHTML = '<option value="">スタッフが登録されていません</option>';
    }
  } catch(e){
    const sel = document.getElementById('staff-select');
    sel.innerHTML = '<option value="">読み込み失敗 - 再読み込みしてください</option>';
  }
  document.getElementById('staff-loading').style.display = 'none';
  document.getElementById('staff-select').style.display = 'block';
}

async function loadLeaveSettings(){
  try {
    const res = await fetch(`${GAS_URL}?action=loadLeaveSettings`);
    const data = await res.json();
    if(data.leaveSettings) leaveSettings = {...leaveSettings, ...data.leaveSettings};
  } catch(e){ console.log('休暇設定の取得に失敗しました', e); }
}

async function loadKibouCache(){
  try {
    const res = await fetch(`${GAS_URL}?action=loadKibou`);
    const data = await res.json();
    kibouListCache = data.kibou || [];
  } catch(e){ console.log('希望休一覧の取得に失敗しました', e); }
}

// 子の看護休暇：4月始まり〜翌3月末
function getFiscalYearRange(baseDate){
  const y = baseDate.getFullYear();
  const startY = baseDate.getMonth() >= 3 ? y : y - 1;
  return {start:new Date(startY,3,1), end:new Date(startY+1,2,31)};
}
// フレックス休暇：1月始まり〜12月末
function getCalendarYearRange(baseDate){
  const y = baseDate.getFullYear();
  return {start:new Date(y,0,1), end:new Date(y,11,31)};
}
function fmtDate(d){ return `${d.getMonth()+1}/${d.getDate()}`; }

// 有給：入社6か月後に初回付与、以後1年ごとに1日ずつ増加（上限なし）。付与から2年で失効。FIFOで消化。
function computePaidLeaveBalance(hireDateStr, paidUsages, today, baseDays, increment){
  if(!hireDateStr) return null;
  const hire = parseLocalDate(hireDateStr);
  if(isNaN(hire.getTime())) return null;
  const firstGrant = new Date(hire.getFullYear(), hire.getMonth()+6, hire.getDate());
  if(today < firstGrant) return {notYet:true, firstGrant};
  const grants = [];
  let n=1;
  let gDate = new Date(firstGrant);
  while(gDate <= today){
    grants.push({date:new Date(gDate), amount: baseDays + (n-1)*increment});
    n++;
    gDate = new Date(gDate.getFullYear()+1, gDate.getMonth(), gDate.getDate());
  }
  const lastGrant = grants[grants.length-1];
  const events = grants.map(g=>({date:g.date, type:'grant', amount:g.amount}));
  paidUsages.forEach(u=> events.push({date:u.date, type:'use', amount:u.days}));
  events.sort((a,b)=> a.date-b.date || (a.type==='grant'?-1:1));
  let carry=0, current=0, usedSinceLastGrant=0;
  events.forEach(e=>{
    if(e.type==='grant'){ carry=current; current=e.amount; usedSinceLastGrant=0; }
    else {
      let amt=e.amount;
      const fromCarry=Math.min(carry,amt); carry-=fromCarry; amt-=fromCarry;
      const fromCurrent=Math.min(current,amt); current-=fromCurrent; amt-=fromCurrent;
      usedSinceLastGrant += (fromCarry+fromCurrent);
    }
  });
  return {remain:carry+current, carry, current, usedSinceLastGrant, lastGrant};
}

async function renderMyBalance(){
  const name = document.getElementById('staff-select').value;
  const card = document.getElementById('my-balance-card');
  const box = document.getElementById('my-balance-content');
  if(!name){ card.style.display='none'; return; }
  card.style.display='block';
  box.innerHTML = '読み込み中…';

  // 選択のたびに最新のデータを取り直す（読み込みタイミングのズレを防ぐため）
  await Promise.all([loadLeaveSettings(), loadKibouCache()]);
  if(allStaff.length===0){
    try { const res=await fetch(`${GAS_URL}?action=loadStaff`); const data=await res.json(); allStaff=data.staff||[]; } catch(e){}
  }

  const s = allStaff.find(x=> (x.name||'').toString().trim()===name.toString().trim());
  if(!s){ box.innerHTML = '<span style="color:var(--red)">スタッフ情報が見つかりませんでした</span>'; return; }

  const now = new Date();
  const childFY = getFiscalYearRange(now);
  const flexCY = getCalendarYearRange(now);

  let usedFlex=0, usedChild=0;
  const paidUsages=[];
  kibouListCache.forEach(k=>{
    if((k.name||'').toString().trim() !== name.toString().trim()) return;
    const code = k.type || 'off';
    let bucket=null;
    if(code==='paid'||code==='paid_am'||code==='paid_pm') bucket='paid';
    else if(code==='flex') bucket='flex';
    else if(code==='child'||code==='child_am'||code==='child_pm') bucket='child';
    if(!bucket) return;
    const perDay = dayWeight(code);
    (k.dates||[]).forEach(ds=>{
      const dt=parseLocalDate(ds);
      if(bucket==='paid') paidUsages.push({date:dt, days:perDay});
      else if(bucket==='flex'){ if(dt>=flexCY.start && dt<=flexCY.end) usedFlex+=perDay; }
      else if(bucket==='child'){ if(dt>=childFY.start && dt<=childFY.end) usedChild+=perDay; }
    });
  });
  usedFlex += Number(s.manualFlexUsed)||0;
  usedChild += Number(s.manualChildUsed)||0;
  if(Number(s.manualPaidUsed)>0) paidUsages.push({date:now, days:Number(s.manualPaidUsed)});

  const flexTotal = leaveSettings.flexDays;
  const childTotal = (Number(s.kids)||0) * leaveSettings.childDaysPerKid;
  const flexRemain = flexTotal - usedFlex;
  const childRemain = childTotal - usedChild;

  let paidLine;
  if(!s.hireDate){
    paidLine = `<div>🟢 <b>有給</b>：<span style="color:var(--red)">入社日が未登録のため計算できません（管理者にご確認ください）</span></div>`;
  } else {
    const b = computePaidLeaveBalance(s.hireDate, paidUsages, now, leaveSettings.paidBaseDays, leaveSettings.paidIncrement);
    if(!b){
      paidLine = `<div>🟢 <b>有給</b>：<span style="color:var(--red)">入社日が未登録のため計算できません</span></div>`;
    } else if(b.notYet){
      paidLine = `<div>🟢 <b>有給</b>：まだ付与されていません（${fmtDate(b.firstGrant)}〜付与予定）</div>`;
    } else {
      const remainColor = b.remain < 0 ? 'var(--red)' : b.remain === 0 ? '#d97706' : 'var(--navy)';
      const complyOk = b.usedSinceLastGrant >= 5;
      const complyText = complyOk
        ? `<span style="color:var(--green);font-size:11px">（✅年5日消化済み）</span>`
        : `<span style="color:var(--red);font-size:11px">（⚠️年5日消化義務まであと${(5-b.usedSinceLastGrant)}日）</span>`;
      paidLine = `<div>🟢 <b>有給</b>：<span style="font-weight:700;color:${remainColor}">残${b.remain}日</span>　${complyText}<div style="font-size:11px;color:var(--gray)">今期消化${b.usedSinceLastGrant}日／今期付与${b.lastGrant.amount}日${b.carry>0?`／繰越${b.carry}日`:''}（直近付与日：${fmtDate(b.lastGrant.date)}）</div></div>`;
    }
  }

  const flexColor = flexRemain < 0 ? 'var(--red)' : flexRemain === 0 ? '#d97706' : 'var(--navy)';
  const childColor = childRemain < 0 ? 'var(--red)' : childRemain === 0 ? '#d97706' : 'var(--navy)';
  const flexLine = `<div style="margin-top:8px">🟣 <b>フレックス休暇</b>：<span style="font-weight:700;color:${flexColor}">残${flexRemain}日</span><div style="font-size:11px;color:var(--gray)">消化${usedFlex}日／付与${flexTotal}日（1月〜12月）</div></div>`;
  const childLine = `<div style="margin-top:8px">🟠 <b>子の看護休暇</b>：<span style="font-weight:700;color:${childColor}">残${childRemain}日</span><div style="font-size:11px;color:var(--gray)">消化${usedChild}日／付与${childTotal}日（対象児童${Number(s.kids)||0}人、4月〜翌3月）</div></div>`;

  box.innerHTML = paidLine + flexLine + childLine;
}

function init(){
  const now = new Date();
  calYear = now.getMonth() === 11 ? now.getFullYear()+1 : now.getFullYear();
  calMonth = (now.getMonth()+1) % 12;
  loadStaff();
  loadLeaveSettings();
  loadKibouCache();
  renderTypeTabs();
  renderCal();
}

// タブ切り替え
function showTab(id, btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tabbtn').forEach(t=>t.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');
  if(btn) btn.classList.add('on');
  if(id==='shiftview') renderShiftView();
}

// 表示用（出勤・公休なども含む全種別の色分け。希望休申請の選択肢とは別に持つ）
const DISPLAY_TYPES = {
  work:       {short:'出勤', bg:'#0891b2', color:'#fff'},
  off:        {short:'休み', bg:'#f1f5f9', color:'#6b7280'},
  paid:       {short:'有給', bg:'#dcfce7', color:'#16a34a'},
  paid_am:    {short:'AM有', bg:'#dcfce7', color:'#16a34a'},
  paid_pm:    {short:'PM有', bg:'#dcfce7', color:'#16a34a'},
  flex:       {short:'フレ休', bg:'#ede9fe', color:'#7c3aed'},
  child:      {short:'看護', bg:'#fef3c7', color:'#d97706'},
  child_am:   {short:'AM看', bg:'#fef3c7', color:'#d97706'},
  child_pm:   {short:'PM看', bg:'#fef3c7', color:'#d97706'},
  bereave:    {short:'慶弔', bg:'#fce7f3', color:'#be185d'},
  absence:    {short:'欠勤', bg:'#fee2e2', color:'#dc2626'},
  absence_am: {short:'AM欠', bg:'#fee2e2', color:'#dc2626'},
  absence_pm: {short:'PM欠', bg:'#fee2e2', color:'#dc2626'},
};
const DAYS_JA = ['日','月','火','水','木','金','土'];
let svYear, svMonth;
let svHolidays = {};
let svShifts = null; // {staffId: {day: value}} の月別マップ

function svChangeMonth(d){
  svMonth += d;
  if(svMonth>11){svMonth=0;svYear++;}
  if(svMonth<0){svMonth=11;svYear--;}
  svShifts = null;
  renderShiftView();
}

async function renderShiftView(){
  if(!svYear){
    const now = new Date();
    svYear = now.getFullYear(); svMonth = now.getMonth();
  }
  document.getElementById('sv-month-title').textContent = `${svYear}年${svMonth+1}月`;
  document.getElementById('sv-table').innerHTML = `<tr><td style="padding:20px;color:var(--gray);font-size:13px">読み込み中…</td></tr>`;

  if(allStaff.length===0){
    try { const res=await fetch(`${GAS_URL}?action=loadStaff`); const data=await res.json(); allStaff=data.staff||[]; } catch(e){}
  }
  if(Object.keys(svHolidays).length===0){
    try { const res=await fetch('https://holidays-jp.github.io/api/v1/date.json'); svHolidays=await res.json(); } catch(e){}
  }
  try {
    const res = await fetch(`${GAS_URL}?action=loadShifts`);
    const data = await res.json();
    svShifts = {};
    (data.shifts||[]).forEach(r=>{
      if(Number(r.year)!==svYear || Number(r.month)!==svMonth) return;
      if(!svShifts[r.staffId]) svShifts[r.staffId]={};
      svShifts[r.staffId][Number(r.day)] = r.value;
    });
  } catch(e){
    document.getElementById('sv-table').innerHTML = `<tr><td style="padding:20px;color:var(--red);font-size:13px">読み込みに失敗しました</td></tr>`;
    return;
  }

  const dim = new Date(svYear, svMonth+1, 0).getDate();
  const days = [];
  for(let d=1; d<=dim; d++){ days.push({d, dow:new Date(svYear,svMonth,d).getDay()}); }
  const dateKey = (d)=> `${svYear}-${String(svMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

  let hdr = '<thead><tr><th>スタッフ</th>';
  days.forEach(({d,dow})=>{
    const holidayName = svHolidays[dateKey(d)];
    let cls = dow===6?'sat':dow===0?'sun':'';
    if(holidayName) cls='holiday';
    hdr += `<th class="${cls}">${d}<br>${DAYS_JA[dow]}</th>`;
  });
  hdr += '</tr></thead>';

  let body = '<tbody>';
  allStaff.forEach(s=>{
    body += `<tr><td>${s.name}</td>`;
    days.forEach(({d})=>{
      const val = (svShifts[s.id] && svShifts[s.id][d]) || null;
      const dt = val ? (DISPLAY_TYPES[val]||DISPLAY_TYPES.off) : null;
      if(dt){
        body += `<td style="background:${dt.bg};color:${dt.color}">${dt.short}</td>`;
      } else {
        body += `<td style="color:var(--gray)">－</td>`;
      }
    });
    body += '</tr>';
  });
  body += '</tbody>';

  const svTableEl = document.getElementById('sv-table');
  svTableEl.innerHTML = hdr + body;
  svTableEl.style.minWidth = (76 + dim*30) + 'px';

  document.getElementById('sv-legend').innerHTML = ['work','off','paid','flex','child','bereave','absence'].map(code=>{
    const dt = DISPLAY_TYPES[code];
    return `<div class="sv-legend-item"><div class="sv-legend-dot" style="background:${dt.bg}"></div>${dt.short}</div>`;
  }).join('') + `<div class="sv-legend-item"><div class="sv-legend-dot" style="background:#f59e0b"></div>祝日</div>`;
}

function changeMonth(d){
  calMonth += d;
  if(calMonth > 11){ calMonth = 0; calYear++; }
  if(calMonth < 0){ calMonth = 11; calYear--; }
  selections = {};
  renderCal();
  updateSelectedList();
}

function renderCal(){
  document.getElementById('cal-title').textContent = `${calYear}年${calMonth+1}月`;
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const dim = new Date(calYear, calMonth+1, 0).getDate();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  for(let i=0;i<firstDow;i++){
    const c = document.createElement('div');
    c.className = 'cal-cell empty'; grid.appendChild(c);
  }
  for(let d=1;d<=dim;d++){
    const dow = new Date(calYear,calMonth,d).getDay();
    const c = document.createElement('div');
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    c.className = 'cal-cell'+(dow===0?' sun':dow===6?' sat':'');
    if(selections[ds]){
      const t = LEAVE_TYPE_LIST.find(x=>x.code===selections[ds]) || LEAVE_TYPE_LIST[0];
      c.style.background=t.bg; c.style.borderColor=t.bg; c.style.color=t.color;
    }
    c.textContent = d;
    c.onclick = () => toggleDate(ds, c);
    grid.appendChild(c);
  }
}

function toggleDate(ds, el){
  if(selections[ds]){
    delete selections[ds];
    el.style.background=''; el.style.borderColor=''; el.style.color='';
  } else {
    selections[ds] = currentType;
    const cur = currentTypeInfo();
    el.style.background=cur.bg; el.style.borderColor=cur.bg; el.style.color=cur.color;
  }
  updateSelectedList();
}

function groupSelections(){
  const groups = {};
  Object.keys(selections).forEach(ds=>{
    const t = selections[ds];
    if(!groups[t]) groups[t]=[];
    groups[t].push(ds);
  });
  return groups;
}

function updateSelectedList(){
  const el = document.getElementById('selected-list');
  const groups = groupSelections();
  const codes = Object.keys(groups);
  if(codes.length === 0){ el.textContent = '希望日を選んでください（複数の種類を組み合わせて選べます）'; return; }
  el.innerHTML = codes.map(code=>{
    const t = LEAVE_TYPE_LIST.find(x=>x.code===code);
    const sorted = [...groups[code]].sort();
    const label = sorted.map(d=>{ const dt=parseLocalDate(d); return `${dt.getMonth()+1}/${dt.getDate()}`; }).join('、');
    return `<div style="margin-bottom:4px"><b style="color:${t.bg}">${t.label}</b>：${label}（${sorted.length}日）</div>`;
  }).join('');
}

function showConfirm(){
  const name = document.getElementById('staff-select').value;
  if(!name){ alert('名前を選択してください'); return; }
  if(Object.keys(selections).length === 0){ alert('希望日を選択してください'); return; }
  const groups = groupSelections();
  const memo = document.getElementById('memo').value;

  document.getElementById('c-name').textContent = name;
  document.getElementById('c-month').textContent = `${calYear}年${calMonth+1}月`;
  document.getElementById('c-memo').textContent = memo || 'なし';

  const typeEl = document.getElementById('c-type');
  const datesEl = document.getElementById('c-dates');
  typeEl.innerHTML = Object.keys(groups).map(code=>{
    const t = LEAVE_TYPE_LIST.find(x=>x.code===code);
    return `<span class="confirm-type-badge" style="background:${t.bg};color:${t.color};margin-right:4px">${t.label}</span>`;
  }).join('');
  datesEl.innerHTML = Object.keys(groups).map(code=>{
    const t = LEAVE_TYPE_LIST.find(x=>x.code===code);
    const sorted = [...groups[code]].sort();
    const label = sorted.map(d=>{ const dt=parseLocalDate(d); return `${dt.getMonth()+1}/${dt.getDate()}`; }).join('、');
    return `<div style="margin-bottom:4px"><b style="color:${t.bg}">${t.label}</b>：${label}</div>`;
  }).join('');

  document.getElementById('form-area').style.display = 'none';
  document.getElementById('confirm-area').style.display = 'block';
  window.scrollTo({top:0, behavior:'smooth'});
}
function hideConfirm(){
  document.getElementById('confirm-area').style.display = 'none';
  document.getElementById('form-area').style.display = 'block';
}

async function submitRequest(){
  const name = document.getElementById('staff-select').value;
  const btn = document.getElementById('confirm-submit-btn');
  btn.disabled = true; btn.textContent = '送信中…';
  const month = `${calYear}年${calMonth+1}月`;
  const memo = document.getElementById('memo').value;
  const groups = groupSelections();

  try {
    for(const code of Object.keys(groups)){
      await fetch(GAS_URL, {
        method: 'POST', mode: 'no-cors',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          action:'kibouKyuu', name, month,
          type: code,
          dates: [...groups[code]].sort(),
          memo
        })
      });
    }
    document.getElementById('confirm-area').style.display = 'none';
    document.getElementById('success-area').style.display = 'block';
  } catch(e){
    alert('送信に失敗しました。もう一度お試しください。');
    btn.disabled = false; btn.textContent = 'この内容で送信する';
  }
}

init();
</script>
